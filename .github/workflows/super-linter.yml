---
name: 🦝 Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/analytical-platform-github-actions/.github/workflows/reusable-super-linter.yml@7c80b25e08b491427f45316a8c10ba44232d985f # v7.2.0
    with:
      super-linter-variables: |
        {
          "LINTER_RULES_PATH": ".",
          "PYTHON_RUFF_CONFIG_FILE": "pyproject.toml",
          "PYTHON_RUFF_FORMAT_CONFIG_FILE": "pyproject.toml",
          "VALIDATE_ALL_CODEBASE": false,
          "VALIDATE_CHECKOV": false,
          "VALIDATE_SPELL_CODESPELL": false,
          "VALIDATE_DOCKERFILE_HADOLINT": false,
          "VALIDATE_HTML": false,
          "VALIDATE_JSCPD": false,
          "VALIDATE_JUPYTER_NBQA_RUFF": false,
          "VALIDATE_KUBERNETES_KUBECONFORM": false,
          "VALIDATE_PRETTIER": false,
          "VALIDATE_PYTHON_BLACK": false,
          "VALIDATE_PYTHON_FLAKE8": false,
          "VALIDATE_PYTHON_ISORT": false,
          "VALIDATE_PYTHON_PYLINT": false,
          "VALIDATE_PYTHON_MYPY": false,
          "VALIDATE_TRIVY": false,
          "VALIDATE_YAML": false,
          "VALIDATE_YAML_PRETTIER": false
        }
